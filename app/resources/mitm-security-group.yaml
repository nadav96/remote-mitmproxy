MitmSecurityGroup:
  Type: AWS::EC2::SecurityGroup
  Properties:
    GroupDescription: EC2 - HTTP (Cloudflare) + SSH
    VpcId:
      Ref: MitmVpc
    SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
        Description: HTTP (Cloudflare proxied)
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 0.0.0.0/0
        Description: SSH
    Tags:
      - Key: Name
        Value:
          Fn::Sub: '${AWS::StackName}-ec2-sg'
