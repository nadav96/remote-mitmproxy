MitmProxyListenerRule:
  Type: AWS::ElasticLoadBalancingV2::ListenerRule
  Properties:
    ListenerArn:
      Ref: MitmHTTPSListener
    Priority: 1
    Conditions:
      - Field: host-header
        HostHeaderConfig:
          Values:
            - Ref: ProxyHostname
    Actions:
      - Type: forward
        TargetGroupArn:
          Ref: MitmProxyTargetGroup
